name: Deploy Edge Functions to Supabase

on:
  push:
    branches:
      - main # O robô vai rodar sempre que você enviar código para a branch principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Copia os arquivos do repositório para o robô do GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instala e configura a ferramenta de deploy do Supabase
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. Faz o deploy automático de todas as Edge Functions de uma vez só
      - name: Deploy All Functions
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}